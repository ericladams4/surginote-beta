<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SurgiNote Admin</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="app-page">

  <div class="app-overlay">
    <main class="app-shell">

      <header class="app-header">
        <div class="app-brand">
          <div class="app-logo">SurgiNote</div>
          <div class="app-product-tag">Admin</div>
        </div>
        <a href="/logout" class="app-logout">Log out</a>
      </header>

      <section class="app-grid">
        <div class="app-left-column">
          <div class="app-card admin-main-card">
            <div class="card-label">Example Library</div>

            <input
              id="procedure"
              class="admin-input"
              placeholder="procedure key e.g. laparoscopic_cholecystectomy"
            />

            <div class="card-label admin-label-spacing">Shorthand input</div>
            <textarea
              id="adminShorthand"
              class="admin-textarea"
              rows="5"
              placeholder="29yoF. Gallstone pancreatitis s/p ERCP w stone retrieval. Labs wnl. Lap chole 3 ports uncomplicated."
            ></textarea>

            <div class="card-label admin-label-spacing">Ideal de-identified note</div>
            <textarea
              id="idealNote"
              class="admin-textarea admin-textarea-lg"
              rows="14"
              placeholder="Paste the ideal de-identified note here"
            ></textarea>

            <div class="card-label admin-label-spacing">Tags</div>
            <input
              id="tags"
              class="admin-input"
              placeholder="comma separated tags"
            />

            <button id="saveExampleBtn" class="primary-action admin-save-button">Save example</button>
            <div id="saveStatus" class="feedback-status"></div>
          </div>
        </div>

        <div class="app-right-column">
          <div class="app-card admin-side-card">
            <div class="card-label">Admin tools</div>

            <div class="admin-guidance">
              <p>Use only manually de-identified examples.</p>
              <p>Keep shorthand realistic to actual surgical workflow.</p>
              <p>Prefer examples you would actually want the model to emulate.</p>
            </div>

            <div class="admin-links">
              <a href="/admin/feedback" class="secondary-action admin-link-button">View feedback</a>
              <a href="/admin/access-requests" class="secondary-action admin-link-button">View access requests</a>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script>
    document.getElementById("saveExampleBtn").addEventListener("click", async () => {
      const payload = {
        procedure: document.getElementById("procedure").value,
        shorthand_input: document.getElementById("adminShorthand").value,
        ideal_note: document.getElementById("idealNote").value,
        tags: document.getElementById("tags").value
          .split(",")
          .map(x => x.trim())
          .filter(Boolean)
      };

      const res = await fetch("/admin/save-example", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      document.getElementById("saveStatus").innerText =
        data.status === "ok" ? "Saved" : "Error";
    });
  </script>
</body>
</html>
