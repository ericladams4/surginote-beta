<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Profile - SurgiNote</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="app-page">
  <div class="app-overlay">
    <main class="login-shell-wide">
      <div class="login-topbar">
        <a href="/" class="brand-link">
          <div class="brand-logo brand-logo-white">
            SurgiNote <span class="brand-beta">Beta</span>
          </div>
        </a>
      </div>

      <div class="phone-login-wrap">
        <section class="login-wide-card phone-login-card">
          <div class="phone-login-inner">
            <div class="phone-login-copy">
              <h1 class="login-title">Badge up.</h1>
              <p class="login-subtitle phone-login-subtitle">Name, credential, done. We’ll get this badge on the board.</p>
            </div>

            {% if phone_display %}
            <div class="profile-complete-phone-card" aria-label="Phone number being set up">
              <div class="profile-complete-phone-label">Setting up account for</div>
              <div class="profile-complete-phone-value">{{ phone_display }}</div>
            </div>
            {% endif %}

            <form method="POST" class="login-form profile-complete-form">
              <label class="login-field">
                <span class="login-field-label">First name</span>
                <input type="text" name="first_name" class="login-input" placeholder="First name" value="{{ current_user.first_name if current_user and current_user.first_name and current_user.first_name != 'None' else '' }}" required />
              </label>
              <label class="login-field">
                <span class="login-field-label">Last name</span>
                <input type="text" name="last_name" class="login-input" placeholder="Last name" value="{{ current_user.last_name if current_user and current_user.last_name and current_user.last_name != 'None' else '' }}" required />
              </label>
              <label class="login-field">
                <span class="login-field-label">Credential</span>
              <select name="credential_title" class="login-input" required>
                <option value="">Select credential</option>
                {% for choice in credential_choices %}
                  <option value="{{ choice }}" {% if current_user and current_user.credential_title == choice %}selected{% endif %}>{{ "Student" if choice == "student" else choice }}</option>
                {% endfor %}
              </select>
              </label>
              <button type="submit" class="primary-action login-button">Continue to SurgiNote</button>
            </form>

            <div class="login-status-row centered phone-login-status">
              {% if error %}
                <div class="feedback-status">{{ error }}</div>
              {% else %}
                <div class="feedback-status login-status-placeholder">&nbsp;</div>
              {% endif %}
            </div>
          </div>
        </section>
      </div>
    </main>
    {% include "_site_footer.html" %}
  </div>
</body>
</html>
