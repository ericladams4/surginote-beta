<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SurgiNote Beta</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="app-page">

  <div class="app-overlay">
    <main class="login-shell-wide">

      <div class="login-topbar">
        <a href="/" class="brand-link">
          <div class="brand-logo brand-logo-white">
            SurgiNote <span class="brand-beta">Beta</span>
          </div>
        </a>
      </div>

      <div class="phone-login-wrap">
        <section class="login-wide-card phone-login-card">
          <div class="phone-login-inner">
            <p class="login-subtitle phone-login-subtitle">
              Enter your mobile number to continue.
            </p>

            <div class="login-form">
              <input
                type="tel"
                id="phoneInput"
                class="login-input"
                placeholder="Phone number"
                autocomplete="tel"
              />

              <button id="continueBtn" type="button" class="primary-action login-button">
                Continue
              </button>
            </div>

            <div class="login-status-row centered phone-login-status">
              <div id="authMessage" class="feedback-status login-status-placeholder">&nbsp;</div>
            </div>
          </div>
        </section>
      </div>

    </main>
    {% include "_site_footer.html" %}
  </div>

  <script>
    const phoneInput = document.getElementById("phoneInput");
    const continueBtn = document.getElementById("continueBtn");
    const authMessage = document.getElementById("authMessage");

    async function continueWithPhone() {
      authMessage.textContent = "";
      continueBtn.disabled = true;
      continueBtn.textContent = "Continuing...";

      try {
        const res = await fetch("/auth/phone-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: phoneInput.value })
        });

        const data = await res.json();

        if (data.redirect) {
          window.location.href = data.redirect;
        } else {
          authMessage.textContent = data.error || "Unable to continue.";
        }
      } catch (err) {
        authMessage.textContent = "Unable to continue.";
      } finally {
        continueBtn.disabled = false;
        continueBtn.textContent = "Continue";
      }
    }

    continueBtn.addEventListener("click", continueWithPhone);

    phoneInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        continueWithPhone();
      }
    });

    phoneInput.focus();
  </script>
</body>
</html>
